name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace the URL below with your actual Hugging Face Space Git URL
          git push --force https://huggingface.co/spaces/richasaxenalal/dense-shelf-object-detection main
